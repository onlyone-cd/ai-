services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: hireinsight
      POSTGRES_USER: hireinsight
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hireinsight -d hireinsight"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://hireinsight:${POSTGRES_PASSWORD}@postgres:5432/hireinsight
      UPLOAD_FOLDER: /data/uploads
      BACKUP_FOLDER: /data/backups
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads:/data/uploads
      - backups:/data/backups
    ports:
      - "5001:5001"

  worker:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://hireinsight:${POSTGRES_PASSWORD}@postgres:5432/hireinsight
      UPLOAD_FOLDER: /data/uploads
      BACKUP_FOLDER: /data/backups
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads:/data/uploads
      - backups:/data/backups
    command: >
      sh -c "python /app/scripts/preflight_production.py &&
      flask --app run db upgrade &&
      python /app/scripts/preflight_production.py --require-migration-head &&
      flask --app run run-tasks --watch --limit ${TASK_WORKER_LIMIT:-5} --sleep-seconds ${TASK_WORKER_SLEEP_SECONDS:-5}"

volumes:
  postgres-data:
  uploads:
  backups:
