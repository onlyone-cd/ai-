<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <style>
      body { width: 360px; margin: 0; padding: 14px; font: 13px/1.45 system-ui, "Microsoft YaHei", sans-serif; color: #17202a; }
      strong { display: block; margin-bottom: 8px; font-size: 14px; }
      label { display: block; margin: 9px 0 4px; font-size: 12px; color: #49657a; }
      input { box-sizing: border-box; width: 100%; padding: 8px 10px; border: 1px solid #d8dee6; border-radius: 6px; }
      button { width: 100%; margin-top: 10px; padding: 8px 12px; border: 0; border-radius: 6px; background: #111; color: #fff; font-weight: 700; cursor: pointer; }
      button.secondary { background: #f1f5f9; color: #17202a; border: 1px solid #d8dee6; }
      button:disabled { cursor: not-allowed; opacity: 0.45; }
      pre { white-space: pre-wrap; word-break: break-all; padding: 10px; border-radius: 6px; background: #f6f8fa; color: #49657a; font-size: 12px; }
      .page-state { margin: 10px 0 4px; padding: 9px 10px; border: 1px solid #d8dee6; border-radius: 6px; background: #fff; }
      .page-state strong { margin: 0 0 3px; font-size: 13px; }
      .page-state span { display: block; color: #49657a; font-size: 12px; }
      .page-state.ok { border-color: #a7f3d0; background: #f0fdf4; }
      .page-state.warn { border-color: #fde68a; background: #fffbeb; }
      .page-state.bad { border-color: #fecaca; background: #fef2f2; }
    </style>
  </head>
  <body>
    <strong>BOSS 简历导入</strong>
    <div id="pageState" class="page-state warn">
      <strong>正在识别当前页面</strong>
      <span>请确认当前标签页是 BOSS 页面</span>
    </div>
    <label>后端地址</label>
    <input id="baseUrl" value="http://120.24.172.139" />
    <label>登录 Token</label>
    <input id="token" placeholder="从系统 BOSS 页面复制插件 Token" />
    <label>岗位 ID（选填，用于 AI 初筛）</label>
    <input id="jobId" placeholder="例如 1" />
    <button id="bindCookieBtn" class="secondary">绑定当前 BOSS 登录态</button>
    <button id="syncJobsBtn" class="secondary">同步当前 BOSS 岗位列表</button>
    <button id="importBtn">采集当前简历并导入</button>
    <button id="batchImportBtn" class="secondary">批量采集沟通列表并导入</button>
    <pre id="status">打开 BOSS 简历详情页、沟通列表或岗位列表后使用对应按钮。</pre>
    <script src="popup.js"></script>
  </body>
</html>
