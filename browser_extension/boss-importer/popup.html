<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <style>
      * { box-sizing: border-box; }
      body {
        width: 380px;
        margin: 0;
        padding: 0;
        font: 13px/1.45 system-ui, "Microsoft YaHei", sans-serif;
        color: #17202a;
        background: #f7fafc;
      }
      .header {
        padding: 14px 16px 12px;
        color: #fff;
        background: linear-gradient(135deg, #0f172a, #0f766e);
      }
      .header strong { display: block; font-size: 15px; letter-spacing: 0; }
      .header span { display: block; margin-top: 3px; color: rgba(255,255,255,.78); font-size: 12px; }
      .content { padding: 12px 14px 14px; }
      label { display: block; margin: 9px 0 4px; font-size: 12px; color: #49657a; }
      input {
        width: 100%;
        padding: 8px 10px;
        border: 1px solid #d8dee6;
        border-radius: 7px;
        background: #fff;
        outline: none;
      }
      input:focus { border-color: #0f766e; box-shadow: 0 0 0 3px rgba(15,118,110,.12); }
      button {
        width: 100%;
        margin-top: 9px;
        padding: 9px 12px;
        border: 0;
        border-radius: 7px;
        background: #0f172a;
        color: #fff;
        font-weight: 700;
        cursor: pointer;
      }
      button.primary { background: #0f766e; }
      button.secondary { background: #fff; color: #17202a; border: 1px solid #d8dee6; }
      button:disabled { cursor: not-allowed; opacity: 0.48; }
      .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
      .page-state {
        margin-bottom: 10px;
        padding: 10px;
        border: 1px solid #d8dee6;
        border-radius: 8px;
        background: #fff;
      }
      .page-state strong { display: block; margin-bottom: 3px; font-size: 13px; }
      .page-state span { display: block; color: #49657a; font-size: 12px; }
      .page-state.ok { border-color: #99f6e4; background: #f0fdfa; }
      .page-state.warn { border-color: #fde68a; background: #fffbeb; }
      .page-state.bad { border-color: #fecaca; background: #fef2f2; }
      pre {
        min-height: 66px;
        margin: 10px 0 0;
        white-space: pre-wrap;
        word-break: break-all;
        padding: 10px;
        border-radius: 8px;
        background: #eef2f7;
        color: #49657a;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <strong>HireInsight BOSS 助手</strong>
      <span>按当前页面自动开启可用操作</span>
    </div>
    <div class="content">
      <div id="pageState" class="page-state warn">
        <strong>正在识别当前页面</strong>
        <span>请确认当前标签页是 BOSS 页面</span>
      </div>

      <label>后端地址</label>
      <input id="baseUrl" value="http://120.24.172.139" />
      <label>登录 Token</label>
      <input id="token" placeholder="从系统 BOSS 页面复制插件 Token" />
      <label>岗位 ID（选填，用于 AI 初筛）</label>
      <input id="jobId" placeholder="例如 1" />

      <button id="obtainedImportBtn" class="primary">一键导入已获得简历</button>
      <button id="importBtn">采集当前在线简历</button>
      <div class="grid">
        <button id="syncJobsBtn" class="secondary">同步岗位</button>
        <button id="batchImportBtn" class="secondary">批量候选人</button>
      </div>
      <button id="bindCookieBtn" class="secondary">绑定 BOSS 登录态</button>
      <pre id="status">打开在线简历、附件简历、沟通列表或岗位列表后使用对应按钮。</pre>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
